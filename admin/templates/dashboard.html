{% extends "base.html" %}
{% block title %}Dashboard - Scanner Pro{% endblock %}
{% block content %}

<div class="d-flex justify-content-between align-items-center mb-4">
    <h4 class="mb-0"><i class="bi bi-grid me-2"></i>Client Dashboard</h4>
    <div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#registerModal">
            <i class="bi bi-plus-lg"></i> Register Client
        </button>
        <button class="btn btn-outline-secondary ms-2" onclick="refreshClients()">
            <i class="bi bi-arrow-clockwise"></i> Refresh
        </button>
    </div>
</div>

<div class="row mb-4" id="statsRow">
    <div class="col-md-3">
        <div class="card stat-card bg-gradient">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Total Clients</div>
                        <div class="stat-value" id="totalClients">0</div>
                    </div>
                    <i class="bi bi-laptops fs-1 text-secondary"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card bg-gradient-success">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Online</div>
                        <div class="stat-value text-success" id="onlineClients">0</div>
                    </div>
                    <i class="bi bi-wifi fs-1 text-success"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card bg-gradient-warning">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Offline</div>
                        <div class="stat-value text-warning" id="offlineClients">0</div>
                    </div>
                    <i class="bi bi-wifi-off fs-1 text-warning"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="col-md-3">
        <div class="card stat-card bg-gradient-info">
            <div class="card-body">
                <div class="d-flex justify-content-between">
                    <div>
                        <div class="stat-label">Pending</div>
                        <div class="stat-value text-info" id="pendingClients">0</div>
                    </div>
                    <i class="bi bi-hourglass-split fs-1 text-info"></i>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="row" id="clientGrid"></div>

<!-- Register Modal -->
<div class="modal fade" id="registerModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header border-0">
                <h5 class="modal-title"><i class="bi bi-person-plus me-2"></i>Register Client</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <p class="text-secondary small">Enter the registration key shown on the client machine.</p>
                <div class="mb-3">
                    <label class="form-label">Registration Key</label>
                    <input type="text" class="form-control form-control-lg text-center" id="regKeyInput"
                           placeholder="e.g. A3K9M2X7" maxlength="8"
                           style="font-family: monospace; font-size: 1.5rem; letter-spacing: 4px; text-transform: uppercase;">
                </div>
                <div class="mb-3">
                    <label class="form-label">Client Name (optional)</label>
                    <input type="text" class="form-control" id="regNameInput" placeholder="e.g. Office PC">
                </div>
            </div>
            <div class="modal-footer border-0">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                <button type="button" class="btn btn-primary" onclick="registerClient()">
                    <i class="bi bi-check-lg"></i> Register
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Toast container -->
<div class="toast-container position-fixed bottom-0 end-0 p-3"></div>

{% endblock %}

{% block scripts %}
<script src="/static/js/dashboard.js"></script>
{% endblock %}
