<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}System Scanner Admin{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/css/app.css" rel="stylesheet">
</head>
<body>
    <div class="d-flex">
        <nav class="sidebar d-flex flex-column flex-shrink-0 p-3">
            <a href="/" class="sidebar-brand d-flex align-items-center mb-4 text-decoration-none">
                <i class="bi bi-hdd-rack fs-4 me-2"></i>
                <span class="fs-6 fw-semibold">Scanner Pro</span>
            </a>
            <hr>
            <ul class="nav nav-pills flex-column mb-auto">
                <li class="nav-item">
                    <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                        <i class="bi bi-grid me-2"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a href="/settings" class="nav-link {% if request.path == '/settings' %}active{% endif %}">
                        <i class="bi bi-gear me-2"></i>Settings
                    </a>
                </li>
            </ul>
            <hr>
            <div class="small text-secondary">
                <i class="bi bi-info-circle"></i> v1.0.0
            </div>
        </nav>

        <main class="main-content flex-grow-1 p-4">
            {% block content %}{% endblock %}
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/app.js"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
