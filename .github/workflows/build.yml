name: Build Executables

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      target:
        description: 'Build target (all, admin, client)'
        default: 'all'
        required: true

permissions:
  contents: write

jobs:
  build-win7:
    runs-on: windows-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build Admin executable
      if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'admin' }}
      run: python build/build.py admin --target=win7

    - name: Build Client executable
      if: ${{ github.event.inputs.target == 'all' || github.event.inputs.target == 'client' }}
      run: python build/build.py client --target=win7

    - name: Build both (default)
      if: ${{ github.event.inputs.target == '' || github.event.inputs.target == 'all' }}
      run: python build/build.py all --target=win7

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: SystemScannerPro-win7-x64
        path: dist/*win7*

  build-win10:
